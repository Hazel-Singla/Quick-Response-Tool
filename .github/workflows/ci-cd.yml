name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # Backend lint and security check
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint || true

    - name: Run security audit
      run: npm audit --audit-level=high || true

    - name: Test build
      run: |
        # Create a dummy .env file for build testing
        echo "PORT=5000" > .env
        echo "NODE_ENV=test" >> .env
        echo "GEMINI_API_KEY=test" >> .env
        # Verify the app can start (will fail due to missing deps in test, but validates syntax)
        node -c src/app.js

  # Frontend lint and build check
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint || true

    - name: Run security audit
      run: npm audit --audit-level=high || true

    - name: Build application
      run: npm run build
      env:
        VITE_API_URL: http://localhost:5000/api

  # Docker build test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: quick-response-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.frontend
        push: false
        tags: quick-response-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Integration test with docker-compose
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cat > .env << EOF
        GEMINI_API_KEY=test-key
        SMTP_HOST=smtp.test.com
        SMTP_PORT=587
        SMTP_USER=test@test.com
        SMTP_PASS=testpass
        EMAIL_FROM=Test <test@test.com>
        EOF

    - name: Start services with docker-compose
      run: |
        docker-compose up -d
        sleep 30

    - name: Test backend health endpoint
      run: |
        curl -f http://localhost:5000/api/health || exit 1

    - name: Test frontend is accessible
      run: |
        curl -f http://localhost || exit 1

    - name: Cleanup
      if: always()
      run: docker-compose down -v

  # Deploy to production (only on main branch pushes)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        echo "Triggering deployment to Render..."
        # This is a placeholder - actual deployment would use Render's API or webhook
        # curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
        #   -H "Authorization: Bearer $RENDER_API_KEY"
        echo "Deployment triggered (configure RENDER_API_KEY secret to enable)"

    - name: Deploy Frontend to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      run: |
        echo "Triggering deployment to Vercel..."
        # This is a placeholder - actual deployment would use Vercel CLI
        # npx vercel --token $VERCEL_TOKEN --prod
        echo "Deployment triggered (configure VERCEL_TOKEN secret to enable)"
